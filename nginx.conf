# nginx configuration for PlanningDie
# วิธีใช้: copy block นี้ไปใส่ใน /etc/nginx/sites-available/playground
# แล้วรัน: sudo nginx -t && sudo systemctl reload nginx
#
# หรือถ้า server มี config อยู่แล้ว ให้เพิ่ม location block เข้าไป

server {
    listen 80;
    listen 443 ssl;
    server_name playground.alumetgroup.com;

    # --- SSL (ถ้ามี cert อยู่แล้ว ให้ชี้ path ที่ถูกต้อง) ---
    # ssl_certificate     /etc/ssl/certs/playground.alumetgroup.com.crt;
    # ssl_certificate_key /etc/ssl/private/playground.alumetgroup.com.key;

    root /var/www/html;   # <-- เปลี่ยนเป็น path จริงบน server
    index index.php index.html;

    # ── PlanningDie app ──────────────────────────────────────────────────
    location /PlanningDie/ {
        try_files $uri $uri/ /PlanningDie/index.php?$query_string;
    }

    # ── PHP-FPM handler (สำคัญมาก — ต้องมีส่วนนี้) ──────────────────────
    location ~ \.php$ {
        # ป้องกัน path traversal
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # socket path — เปลี่ยนให้ตรงกับ PHP version บน server
        # ดู version ด้วย: php -v
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;  # php8.2 / php8.1 / php8.0
        # หรือถ้าใช้ TCP: fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # ── Block access to sensitive files ──────────────────────────────────
    location ~ /\.(ht|git|env) {
        deny all;
    }
    location ~* \.(db|sqlite|sqlite3|phar|json|lock)$ {
        deny all;
    }
    location /PlanningDie/vendor/ {
        deny all;
    }
    location /PlanningDie/db/ {
        deny all;
    }

    # ── Static assets cache ───────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
